<div class="max-w-7xl mx-auto p-4 space-y-4">
    <app-expansion-panel-header
      [isOpenSignal]="isSessionPanelOpen"
      panelTitle="Active Session">
    </app-expansion-panel-header>

  <!-- ================= HEADER CARD ================= -->
  <div class="bg-white rounded-xl shadow-sm border p-4">

    <div class="flex flex-col md:flex-row md:items-end gap-3">

      <!-- ✅ User ID -->
      <div class="w-full md:w-[250px]">
        <input-text-box
          class="w-full "
          [frmGroup]="sessionDataForm"
          controlName="userId"
          label="User ID"
          displayMode="outline">
        </input-text-box>
      </div>

      <!-- ✅ Button -->
      <div>
        <button
          class="h-[42px] px-5 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition"
          (click)="getActiveSessions()">
          Get Active Session
        </button>
      </div>

    </div>

  </div>


  <!-- ================= GRID SECTION ================= -->
  <div class="bg-white rounded-xl shadow-sm border p-3">

    <div class="overflow-x-auto">

      <generic-data-grid
        class="min-w-[700px]"

        [dataSource]="filteredUserSessionList || []"

        [selectedColumns]="[
          'userId',
          'ipAddress',
          'startTime',
          'lastAccessTime',
          'activeFlag'
        ]"

        [customColumnNames]="{
          userId: 'User ID',
          ipAddress: 'IP Address',
          startTime: 'Start Time',
          lastAccessTime: 'Last Access',
          activeFlag: 'Status'
        }"

        [showEditButton]="true"
        [showDeleteButton]="false"

        [useInlineEdit]="false"
        [searchEnabled]="true"

        [uniqueIdField]="'userId'"

        (onFHEditClick)="onClear($event)">
      </generic-data-grid>

    </div>

  </div>

</div>

<div class="max-w-7xl mx-auto p-4 space-y-4">

  <!-- ================= INPUT PANEL ================= -->
  <div>

    <app-expansion-panel-header
      [isOpenSignal]="isMerchantInputOpen"
      panelTitle="Merchant Type Entry">
    </app-expansion-panel-header>

    @if (isMerchantInputOpen()) {
      <div class="bg-white rounded-xl shadow-sm border p-4 mt-1">

        <div class="max-w-sm">
          <input-text-box
            class="w-full"
            [frmGroup]="searchForm"
            controlName="merchantType"
            label="Merchant Type"
            displayMode="outline">
          </input-text-box>
        </div>

      </div>
    }

  </div>


  <!-- ================= GRID PANEL ================= -->
  <div>

    <app-expansion-panel-header
      [isOpenSignal]="merchantPanel"
      panelTitle="Merchant Type List">
    </app-expansion-panel-header>

    @if (merchantPanelGrid()) {

      <div class="bg-white rounded-xl shadow-sm border p-3 mt-1">

        <div class="overflow-x-auto">

          <generic-data-grid
            class="min-w-[600px]"

            [id]="'id'"
            [uniqueIdField]="'id'"

            [dataSource]="merchantTypeGrid || []"

            [showEditButton]="true"
            [showDeleteButton]="true"
            [useInlineEdit]="false"

            [initPageSize]="5"
            [pageSizeOptions]="[5, 10]"

            (onFHEditClick)="editMerchantType($event)"
            (onFHDeleteClick)="deleteMerchantType($event)">
          </generic-data-grid>

        </div>

      </div>

    }

  </div>

</div>

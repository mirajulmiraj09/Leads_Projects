<div class="h-full overflow-y-auto module-drawer bg-[var(--theme-background)]">
    <div class="p-6">

        <!-- Loading State -->
        <div *ngIf="isLoading" class="flex justify-center items-center h-40">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
        </div>

        <!-- Error State -->
        <div *ngIf="error && !isLoading" class="text-center text-red-500 p-4">
            {{ error }}
        </div>

        <!-- Modules Grid -->
        <div *ngIf="!isLoading && !error" class="grid grid-cols-3 gap-3 md:max-w-4xl mx-auto">

            <!-- Dynamic Module Items -->
            <div *ngFor="let module of modulesList" (click)="selectModule(module.id)"
                [class]="getModuleClasses(module)">

                <!-- Module Icon -->
               <!-- Module Icon -->
          <div class="w-12 h-12 rounded-full flex items-center justify-center
              shadow-sm mb-1 transition-transform duration-300" [class]="getIconClasses(module)">
              <img [src]="module.icon"
                  [alt]="module.name"
                  class="w-full h-full object-contain rounded-full"
                  onerror="this.style.display='none'; this.parentElement.innerHTML='🏦';"
                  />
          </div>

                <!-- Module Name -->
                <h2 class="module-name mt-1 text-xs sm:text-sm font-semibold text-gray-800 px-1
                    truncate max-w-[80px] group-hover:whitespace-normal group-hover:break-words
                    group-hover:overflow-visible transition-all duration-300 leading-tight text-center">
                    {{ module.name }}
                </h2>

                <!-- Selection Indicator -->
                <div *ngIf="isModuleSelected(module.id)"
                    class="absolute top-1 right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
            </div>
        </div>
    </div>
</div>

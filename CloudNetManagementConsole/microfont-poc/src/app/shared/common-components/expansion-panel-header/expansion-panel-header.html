<div [attr.panelId]="panelId" class="expansion-header py-2 theme-primary-bg" (click)="togglePanel()">
  <div class="flex gap-2 items-center relative">
    <div class="w-5 h-5 mr-3 text-white -mt-[1px]">
      <!-- Modern panel icon using SVG -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-full h-full">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
      </svg>
    </div>
    <h2>
      <span>{{panelTitle()}}</span>
    </h2>
    <svg xmlns="http://www.w3.org/2000/svg" class="absolute right-0" height="24px" viewBox="0 -960 960 960" width="24px" fill="white"><path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/></svg>
  </div>
</div>

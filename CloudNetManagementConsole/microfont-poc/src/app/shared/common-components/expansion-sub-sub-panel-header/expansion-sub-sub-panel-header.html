<div [attr.panelId]="panelId" class="expansion-sub-sub-header pl-4" (click)="togglePanel()">
  <div class="flex gap-2 items-center relative justify-between">
    <div class="flex gap-2 items-center">
      <div class="w-4 h-4 mr-2 -mt-[1px]">
        <!-- Smaller icon for third level using SVG -->
        <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" stroke-width="2.5"
             viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
      </div>
      <div>
        <span class="text-sm font-medium text-slate-700">{{ subSubPanelTitle() }}</span>
      </div>
    </div>

    <div class="flex items-center gap-2">
      @if (isButton()) {
        <button
          (click)="onActionClick($event)"
          class="group relative w-6 h-6 flex items-center justify-center rounded-full border border-slate-300 text-slate-600 bg-slate-50 hover:border-slate-400 hover:text-slate-700 hover:bg-slate-100 hover:shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-400 focus:ring-offset-1 active:scale-95 transition-all duration-150 ease-in-out"
          type="button">
          <!-- Plus Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#475569"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        </button>
      }

      <!-- Toggle Arrow Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" [class.rotate-180]="isOpenSignal()()" class="w-4 h-4 text-slate-600 transition-transform duration-200" height="20px" viewBox="0 -960 960 960" width="20px" fill="#64748b"><path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/></svg>
    </div>
  </div>
</div>

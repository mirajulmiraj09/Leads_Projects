@if (!isHidden) {
  <div class="w-full" [formGroup]="frmGroup()">
    <!-- Switch Container: horizontal or vertical -->
    @if (displayMode() === 'vertical') {
      <div class="flex flex-col items-start">
        <!-- Label -->
        @if (label()) {
          <label [for]="id()" class="input-label block mb-1 text-sm font-medium text-gray-700 cursor-pointer select-none">
            {{ label() }}
            @if (isRequired()) { <span class="text-red-500 ml-1">*</span> }
          </label>
        }

        <!-- Custom Switch -->
        <div class="relative">
          <input
            type="checkbox"
            [id]="id()"
            [formControlName]="controlName()"
            [attr.controlName]="controlName()"
            [style]="style()"
            (change)="toggleSwitch()"
            class="sr-only">

          <div
            class="relative w-11 h-6.5 bg-gray-200 border border-gray-300 rounded-full cursor-pointer  duration-300"
            [ngClass]="{
              'bg-gray-200': !currentValue,
              'bg-[var(--theme-secondary)]': currentValue,
              ' cursor-not-allowed': isDisabled,
              'ring-2 ring-red-300 ring-offset-2': isInvalidState()
            }"
            (click)="!isDisabled && toggleSwitch()">

            <div
              class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow-lg  transition-all duration-300  flex items-center justify-center"
              [ngClass]="{'translate-x-5': currentValue, 'translate-x-0': !currentValue}">
              @if (currentValue) {
                <svg class="w-4 h-4 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
              }
              @if (!currentValue) {
                <svg class="w-3 h-3 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
              }
            </div>
          </div>
        </div>
      </div>
    }
    @else {
      <div class="flex items-center space-x-3">
        <!-- Custom Switch -->
        <div class="relative">
          <input
            type="checkbox"
            [id]="id()"
            [formControlName]="controlName()"
            [attr.controlName]="controlName()"
            [style]="style()"
            (change)="toggleSwitch()"
            class="sr-only">

          <!-- Switch Track -->
          <div
            class="relative w-11 h-6.5 bg-gray-200 border border-gray-300 rounded-full cursor-pointer  duration-300"
            [ngClass]="{
              'bg-gray-200': !currentValue,
              'bg-[var(--theme-secondary)]': currentValue,
              ' cursor-not-allowed': isDisabled,
              'ring-2 ring-red-300 ring-offset-2': isInvalidState()
            }"
            (click)="!isDisabled && toggleSwitch()">

            <!-- Switch Thumb -->
            <div
              class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow-lg  transition-all duration-300  flex items-center justify-center"
              [ngClass]="{'translate-x-5': currentValue, 'translate-x-0': !currentValue}">

              <!-- Check Icon (only visible when checked) -->
              @if (currentValue) {
                <svg
                  class="w-4 h-4 text-blue-600"
                  fill="currentColor"
                  viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
              }

              <!-- X Icon (only visible when unchecked) -->
              @if (!currentValue) {
                <svg
                  class="w-3 h-3 text-gray-400"
                  fill="currentColor"
                  viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
              }
            </div>

            <!-- Ripple Effect -->
            @if (currentValue) {
              <!-- <div
                class="absolute inset-0 rounded-full bg-blue-200 opacity-20 animate-pulse">
              </div> -->
            }
          </div>
        </div>

        <!-- Label -->
        @if (label()) {
          <label [for]="id()" class="text-sm font-medium text-gray-700 cursor-pointer select-none">
            {{ label() }}
            @if (isRequired()) {
              <span class="text-red-500 ml-1">*</span>
            }
          </label>
        }
      </div>
    }

    <!-- Error Message -->
    @if (isInvalidState()) {
      <div class="mt-2 text-sm text-red-600 flex items-center">
        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{ errorMessage() }}
      </div>
    }
  </div>
}

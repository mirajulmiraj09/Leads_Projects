    <confirmation-dialogue
      [isOpen]="isDeleteConfirmationModalOpen()"
      [title]="'Delete Confirmation'"
      [message]="'Are you sure you want to delete this item? This action cannot be undone.'"
      (close)="closeDeleteConfirmationModal()"
      (buttonClick)="onDeleteConfirmationModalButtonClick($event)"
    >
    </confirmation-dialogue>

    <confirmation-dialogue
      [isOpen]="isSuccessConfirmationModalOpen()"
      [variant]="'success'"
      [title]="'Success Confirmation'"
      [message]="'Are you sure you want to proceed with this successful operation? This confirmation is informational.'"
      (close)="closeSuccessConfirmationModal()"
      (buttonClick)="onSuccessConfirmationModalButtonClick($event)"

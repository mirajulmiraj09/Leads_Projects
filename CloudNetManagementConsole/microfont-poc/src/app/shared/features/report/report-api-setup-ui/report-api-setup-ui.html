<div class="page-wrapper">

    <!-- Loading Indicator -->
    @if (loading()) {
      <div class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
      </div>
    }

    <!-- Form Content -->
    @if (!loading()) {
      <form [formGroup]="endpointForm" class="p-8">

        <!-- API Endpoint Information Section -->
        <div class="mb-8">
          <app-expansion-panel-header [isOpenSignal]="apiEndpointPanel" [panelTitle]="'API Endpoint Information'"></app-expansion-panel-header>

          @if (apiEndpointPanel()) {
          <div class="form-grid-col-1">
                <!-- Endpoint Id with Lookup -->
                <!-- <input-id-box
                  [frmGroup]="endpointForm"
                  [controlName]="'id'"
                  [label]="'Endpoint ID (Auto-generated)'"
                  
                  [isDotsVisible]="true"
                  [tooltip]="'Click to search endpoints'"
                  [tooltipPosition]="'above'"
                  [placeholder]="'Auto-generated by system'"
                  [tooltipDelay]="300"
                  (dotsClicked)="openEndpointModal()"
                  (onChanged)="onIdChanged($event)"
                ></input-id-box> -->

            <!-- Endpoint Name -->
            <input-text-box
              [frmGroup]="endpointForm"
              controlName="endpointName"
              label="Endpoint Name"
              
              [maxLength]="100"
              placeholder="e.g., User API Endpoint"
            >
            </input-text-box>

            <!-- Endpoint URL -->
            <input-text-box
              [frmGroup]="endpointForm"
              controlName="endpointUrl"
              label="Endpoint URL"
              
              [maxLength]="500"
              placeholder="https://api.example.com/endpoint"
            >
            </input-text-box>

            <!-- HTTP Method -->
            <input-select-option-field
              [frmGroup]="endpointForm"
              controlName="httpMethod"
              label="HTTP Method"
              [options]="httpMethodOptions"
              
              [searchable]="true"
              placeholder="Select HTTP method"
            >
            </input-select-option-field>

            <!-- Authentication Type -->
            <input-select-option-field
              [frmGroup]="endpointForm"
              controlName="authenticationType"
              label="Authentication Type"
              [options]="authenticationTypeOptions"
              
              [searchable]="true"
              placeholder="Select authentication type"
            >
            </input-select-option-field>

            <!-- Authentication Credentials - Conditional Display -->
            @if (showAuthCredentials()) {
              
              <!-- Basic Auth Fields -->
              @if (showBasicAuth()) {
                <input-text-box
                  [frmGroup]="endpointForm"
                  controlName="authUsername"
                  label="Username"
                  
                  [maxLength]="50"
                  placeholder="Enter username"
                >
                </input-text-box>

                <input-text-box
                  [frmGroup]="endpointForm"
                  controlName="authPassword"
                  label="Password"
                  
                  [maxLength]="50"
                  [type]="'password'"
                  placeholder="Enter password"
                >
                </input-text-box>
              }

              <!-- Token/API Key Field -->
              @if (showTokenAuth()) {
                <input-text-box
                  [frmGroup]="endpointForm"
                  controlName="authToken"
                  label="Token / API Key"
                  
                  [maxLength]="200"
                  [type]="'password'"
                  placeholder="Enter token or API key"
                >
                </input-text-box>
              }
            }

            <!-- Headers (JSON format) -->
            <input-text-area
              [frmGroup]="endpointForm"
              [controlName]="'headers'"
              [label]="'Headers (JSON format)'"
              
              [placeholder]="'Enter headers in JSON format'"
              [rows]="3"
              [maxLen]="1000"
            ></input-text-area>

            <!-- Timeout -->
            <input-number
              [frmGroup]="endpointForm"
              [controlName]="'timeout'"
              [label]="'Timeout (seconds)'"
              
              [minValue]="5"
              [maxValue]="300"
              [placeholder]="'30'"
            ></input-number>
          </div>

          <!-- Action Buttons -->
          <div class="mt-8 flex gap-3 justify-end border-t pt-6">
            <generic-button
              [label]="'Test Endpoint'"
              [icon]="'wifi_tethering'"
              [enable]="!loading()"
              (onClick)="onTestEndpoint()"
              [cssClass]="'bg-green-600 hover:bg-green-700 text-white'"
            ></generic-button>
          </div>
          }
        </div>
      </form>
    }
</div>
